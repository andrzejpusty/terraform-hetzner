name: Terraform Apply

on:
  workflow_dispatch:

jobs:
  terraform:
    runs-on: ubuntu-latest

    env:
      HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
      TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        run: terraform init

      - name: Terraform apply
        run: terraform apply -auto-approve

      - name: Trigger Ansible Deploy
        run: |
          status=$(curl --silent --show-error --output /tmp/dispatch_response.txt --write-out "%{http_code}" \
            -X POST https://api.github.com/repos/andrzejpusty/ansible-hetzner-test/dispatches \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.ANSIBLE_REPO_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -d '{"event_type":"terraform-apply-finished"}')

          echo "HTTP status: $status"
          echo "Response body:"
          cat /tmp/dispatch_response.txt || true

          if [ "$status" != "204" ]; then
            echo "Repository dispatch failed"
            exit 1
          fi
